name: NerionOS Instagram AutoPost

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without publishing"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      force:
        description: "Ignore same-day duplicate guard"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  instagram-autopost:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
      IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Instagram autopost
        shell: bash
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          if [ "${{ github.event_name }}" = "schedule" ]; then
            ARGS="$ARGS --force"
          fi
          node automation/instagram-autopost/daily-story-autopost.mjs $ARGS

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instagram-autopost-runs
          path: automation/instagram-autopost/runs/
          if-no-files-found: ignore
