# Design output - generated by Design phase
squad:
  code: "instagram-feed-publisher"
  name: "Instagram Feed Publisher"
  description: "Gera carrosseis e posts de feed para Instagram da NerionOS, revisa, renderiza e publica com confirmacao."

agents:
  - id: "sofia-sinal"
    name: "Sofia Sinal"
    title: "Pesquisadora de Sinais"
    icon: "🔎"
    execution: "subagent"
    role_summary: "Pesquisa o tema do dia e transforma em um briefing curto para conteudo."
    skills: ["web_search", "web_fetch"]
  - id: "igor-instagram"
    name: "Igor Instagram"
    title: "Criador de Carrosseis"
    icon: "✍️"
    execution: "inline"
    role_summary: "Cria hooks, angulos, roteiro de carrossel, legenda e hashtags."
    skills: []
  - id: "diego-design"
    name: "Diego Design"
    title: "Designer de Slides"
    icon: "🎨"
    execution: "inline"
    role_summary: "Transforma o roteiro aprovado em slides visuais para Instagram."
    skills: ["image-creator", "image-ai-generator", "template-designer", "image-fetcher"]
  - id: "renata-revisao"
    name: "Renata Revisao"
    title: "Revisora de Qualidade"
    icon: "✅"
    execution: "inline"
    role_summary: "Revisa copy, clareza, marca, visual e requisitos de Instagram."
    skills: []
  - id: "paula-publica"
    name: "Paula Publica"
    title: "Publicadora de Instagram"
    icon: "🚀"
    execution: "inline"
    role_summary: "Valida, faz dry-run e publica somente depois de confirmacao explicita."
    skills: ["instagram-publisher"]

pipeline:
  - step: 1
    name: "research-focus"
    type: "checkpoint"
    output_file: "squads/instagram-feed-publisher/output/research-focus.md"
  - step: 2
    name: "research-brief"
    type: "agent"
    agent: "sofia-sinal"
    execution: "subagent"
    input_file: "squads/instagram-feed-publisher/output/research-focus.md"
    output_file: "squads/instagram-feed-publisher/output/topic-research.md"
    model_tier: "powerful"
  - step: 3
    name: "generate-angles"
    type: "agent"
    agent: "igor-instagram"
    execution: "inline"
    format: "instagram-feed"
    input_file: "squads/instagram-feed-publisher/output/topic-research.md"
    output_file: "squads/instagram-feed-publisher/output/angles.md"
  - step: 4
    name: "select-angle"
    type: "checkpoint"
    output_file: "squads/instagram-feed-publisher/output/selected-angle.md"
  - step: 5
    name: "create-carousel"
    type: "agent"
    agent: "igor-instagram"
    execution: "inline"
    format: "instagram-feed"
    input_file: "squads/instagram-feed-publisher/output/selected-angle.md"
    output_file: "squads/instagram-feed-publisher/output/carousel-copy.md"
    on_reject: 5
  - step: 6
    name: "approve-copy"
    type: "checkpoint"
    output_file: "squads/instagram-feed-publisher/output/copy-approval.md"
  - step: 7
    name: "design-slides"
    type: "agent"
    agent: "diego-design"
    execution: "inline"
    input_file: "squads/instagram-feed-publisher/output/copy-approval.md"
    output_file: "squads/instagram-feed-publisher/output/visuals.md"
  - step: 8
    name: "review-content"
    type: "agent"
    agent: "renata-revisao"
    execution: "inline"
    input_file: "squads/instagram-feed-publisher/output/visuals.md"
    output_file: "squads/instagram-feed-publisher/output/review.md"
    on_reject: 5
  - step: 9
    name: "approve-final"
    type: "checkpoint"
    output_file: "squads/instagram-feed-publisher/output/final-approval.md"
  - step: 10
    name: "publish-dry-run"
    type: "agent"
    agent: "paula-publica"
    execution: "inline"
    input_file: "squads/instagram-feed-publisher/output/final-approval.md"
    output_file: "squads/instagram-feed-publisher/output/publish-preview.md"
  - step: 11
    name: "confirm-live-publish"
    type: "checkpoint"
    output_file: "squads/instagram-feed-publisher/output/live-publish-confirmation.md"
  - step: 12
    name: "publish-live"
    type: "agent"
    agent: "paula-publica"
    execution: "inline"
    input_file: "squads/instagram-feed-publisher/output/live-publish-confirmation.md"
    output_file: "squads/instagram-feed-publisher/output/publish-result.md"

investigation:
