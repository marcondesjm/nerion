<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body {
      width: 1024px;
      height: 1024px;
      margin: 0;
      overflow: hidden;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mark-wrap {
      width: 900px;
      height: 900px;
      border-radius: 50%;
      overflow: hidden;
      filter: drop-shadow(0 24px 64px rgba(0, 0, 0, .22));
    }
    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>
  <div class="mark-wrap">
    <img src="./lord-of-prompts-logo.png" alt="">
  </div>
</body>
</html>
